import:
  - ~/.config/alacritty/rose-pine.yml
font:
  normal:
    family: IBM Plex Mono
    style: Regular
  bold:
    family: IBM Plex Mono
    style: bold
  italic:
    family: IBM Plex Mono
    style: Regular Italic
  size: 14.0
live_config_reload: true
shell:
  program: /opt/homebrew/bin/tmux
  args:
    - new-session
    - -A
    - -D
    - -s
    - main
window:
  dynamic_padding: false
  padding:
    x: 2
    y: 2
